version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: 0bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_app_local}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  # Redis (optional, for caching)
  redis:
    image: redis:7-alpine
    container_name: 0bot-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bot-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: 0bot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-auth_app_local}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
      # Bybit API (optional)
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      # NOWPayments billing (required for /api/billing/* endpoints)
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET}
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:3000}
      # Set to 'true' to use NOWPayments sandbox for testing
      NOWPAYMENTS_SANDBOX: ${NOWPAYMENTS_SANDBOX:-false}
      # Comma-separated outbound IPs the user must whitelist on exchange APIs
      WHITELIST_IPS: ${WHITELIST_IPS}
      EXECUTION_ENGINE_SOCKET_PATH: /tmp/bot-execution-engine.sock
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/prisma:/app/backend/prisma
      - engine_socket:/tmp
      - engine_shm:/data/shm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bot-network
    command: sh -c "npx prisma db push --accept-data-loss --skip-generate && node server.js"

  # Execution Engine (standalone process for trading services)
  execution-engine:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: 0bot-execution-engine
    restart: unless-stopped
    shm_size: '64m'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-auth_app_local}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
      EXECUTION_ENGINE_SOCKET_PATH: /tmp/bot-execution-engine.sock
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
    volumes:
      - ./backend/prisma:/app/backend/prisma
      - engine_socket:/tmp
      - engine_shm:/data/shm
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect('/tmp/bot-execution-engine.sock').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - bot-network
    command: sh -c "npx prisma db push --accept-data-loss --skip-generate && npx tsx src/execution-engine/engine-process.ts"

  # C++ Execution Core (low-latency market data and order submission)
  cpp-core:
    build:
      context: .
      dockerfile: cpp-core/Dockerfile
    container_name: 0bot-cpp-core
    restart: unless-stopped
    shm_size: '64m'
    depends_on:
      execution-engine:
        condition: service_healthy
    environment:
      EXECUTION_ENGINE_SOCKET_PATH: /tmp/bot-execution-engine.sock
      MARKET_DATA_SHM_PATH: /data/shm/bot-market-data.shm
      RING_BUFFER_SLOT_COUNT: ${RING_BUFFER_SLOT_COUNT:-4096}
      BYBIT_SYMBOLS: ${BYBIT_SYMBOLS:-BTCUSDT,ETHUSDT}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_WS_HOST: ${BYBIT_WS_HOST:-stream.bybit.com}
      BYBIT_REST_HOST: ${BYBIT_REST_HOST:-api.bybit.com}
      CONNECTOR_MODE_BYBIT: ${CONNECTOR_MODE_BYBIT:-shadow}
      MAX_SLIPPAGE_BPS: ${MAX_SLIPPAGE_BPS:-50.0}
    volumes:
      - engine_socket:/tmp
      - engine_shm:/data/shm
    networks:
      - bot-network

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: 0bot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  engine_socket:
    driver: local
  engine_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
